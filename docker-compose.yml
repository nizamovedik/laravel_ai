services:
  nginx:
    image: nginx:latest
    volumes:
      - ./:/var/www
      - ./_docker/nginx/conf.d:/etc/nginx/conf.d
    ports:
      - 8786:80
    depends_on:
      - app
      - redis
    container_name: project_ai_nginx

  app:
    build:
      context: .
      dockerfile: _docker/app/Dockerfile
    depends_on:
      - db
    volumes:
      - ./:/var/www
    container_name: project_ai_app

  db:
    image: mysql:8.4
    restart: always
    volumes:
      - ./tmp/db:/var/lib/mysql
    environment:
      MYSQL_DATABASE: laravel_ai_docker
      MYSQL_ROOT_PASSWORD: d27Y8g2URA%
    ports:
      - 8101:3306
    command: mysqld --character-set-server=utf8 --collation-server=utf8_unicode_ci
    container_name: project_ai_db

  redis:
    image: redis:7-alpine
    container_name: project_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
volumes:
  redis_data:
    driver: local
